schema_version: 1

context:
  name: zntrack
  version: "0.8.10"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/zntrack-${{ version }}.tar.gz
  sha256: 3b03fc0177657f0e5687325482ae22b2090561d7f890040c58885910a1ab59f3

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - zntrack = zntrack.cli:app

requirements:
  host:
    - python 3.10.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - dvc >=3.60.0
    - pyyaml >=6.0.2
    - tqdm >=4.67.1
    - znjson >=0.2.6
    - znflow >=0.2.5
    - typer >=0.15.1
    - znfields >=0.1.2
    - pandas >=2.2.3

tests:
  - python:
      imports:
        - zntrack
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - git
        - python ${{ python_min }}.*
    script:
      - zntrack --help

about:
  summary: Create, Run and Benchmark DVC Pipelines in Python
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/zincware/ZnTrack

extra:
  recipe-maintainers:
    - jan-janssen
